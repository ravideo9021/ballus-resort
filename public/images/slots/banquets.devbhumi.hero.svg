<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="meadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F3B47"/>
      <stop offset="70%" stop-color="#0B1B22"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#meadow)"/>
  <!-- rolling hills -->
  <path d="M0,640 Q400,560 800,620 T1600,600 L1600,900 L0,900 Z" fill="#081318"/>
  <path d="M0,720 Q400,660 800,700 T1600,680 L1600,900 L0,900 Z" fill="#050D10"/>
  <!-- tent / marquee peaks -->
  <polygon points="360,700 440,540 520,700" fill="#0B1B22" stroke="#C9A24B" stroke-width="2"/>
  <polygon points="560,700 640,540 720,700" fill="#0B1B22" stroke="#C9A24B" stroke-width="2"/>
  <polygon points="760,700 840,540 920,700" fill="#0B1B22" stroke="#C9A24B" stroke-width="2"/>
  <polygon points="960,700 1040,540 1120,700" fill="#0B1B22" stroke="#C9A24B" stroke-width="2"/>
  <polygon points="1160,700 1240,540 1320,700" fill="#0B1B22" stroke="#C9A24B" stroke-width="2"/>
  <!-- stars -->
  <g fill="#E5C97A" opacity="0.8">
    <circle cx="200" cy="120" r="2"/><circle cx="450" cy="80" r="2"/><circle cx="720" cy="140" r="2"/>
    <circle cx="1000" cy="60" r="2"/><circle cx="1250" cy="130" r="2"/><circle cx="1450" cy="90" r="2"/>
  </g>
  <text x="800" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="64" font-style="italic" fill="#E5C97A">Devbhumi Lawn</text>
  <text x="800" y="400" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" letter-spacing="6" fill="#C9A24B">OPEN-AIR VENUE</text>
</svg>
